<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChaosFill Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body class="chaosfill-options">
    <div class="layout">
      <aside class="sidebar" id="sidebar"></aside>

      <main class="main">
        <header class="topbar">
          <h1>ChaosFill Options</h1>
          <div class="actions">
            <button id="saveBtn" class="primary">Save settings</button>
            <button id="resetBtn">Reset defaults</button>
            <button id="exportBtn">Export JSON</button>
            <button id="importBtn">Import JSON</button>
            <input id="importFile" type="file" accept="application/json" hidden />
          </div>
        </header>

        <div id="toast" class="toast" hidden>
          <span id="toastMessage" class="toast-message"></span>
        </div>

        <section id="mainContent" class="content"></section>
      </main>
    </div>

    <script src="../storage.js"></script>
    <script src="options.js"></script>
  </body>
</html>
